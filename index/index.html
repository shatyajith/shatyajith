<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#e9f2ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    width:380px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    text-align:center;
}

.logo{
    width:120px;
    margin-bottom:15px;
}

h2{
    color:#003366;
    margin-bottom:5px;
}

h3{
    color:#666;
    margin-bottom:20px;
    font-weight:normal;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:5px;
    background:#003366;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}
</style>

</head>
<body>

<div class="login-container">

    <img src="KLNcolorlogo.png" alt="KLN Logo" class="logo">

    <h2>K.L.N College of Engineering</h2>
    <h3>Student Login</h3>

    <form onsubmit="return login()">

        <input
            type="text"
            id="studentid"
            placeholder="Student ID"
            required>

        <input
            type="password"
            id="password"
            placeholder="Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

<script>

function login(){

    let id=document.getElementById("studentid").value;
    let pass=document.getElementById("password").value;

    if(id==="221CS001" && pass==="admin123")
    {
        alert("Login Successful!");
    }
    else
    {
        alert("Invalid Student ID or Password");
    }

    return false;
}

</script>

</body>
</html>
