<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login</title>
    <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#e9f2ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    background:#fff;
    width:350px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    text-align:center;
}

.logo{
    width:120px;
    margin-bottom:15px;
}

h2{
    color:#003366;
    font-size:22px;
    margin-bottom:5px;
}

h3{
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0055aa;
}
  </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

<div class="login-container">

    <img src="KLNcolorlogo.png" alt="logo" class="logo">

    <h2>K.L.N College of Engineering</h2>
    <h3>Student Login</h3>

    <form action="#">
        <input type="text" placeholder="Student ID" required>

        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form
    

</div>

</body>
</html>
